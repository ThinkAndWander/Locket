<!DOCTYPE html>
<html lang="en">
<head>
    <script type="text/javascript" src="mainapp.min.js" defer></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="Locket" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <meta name="apple-mobile-web-app-title" content="Locket">
    <meta name="description" content="A cozy slice-of-life adventure where you find the meaning of life by living." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#CCFFCC"/>
    <meta name="msapplication-TileColor" content="#8fa620" />
    <meta name="msapplication-config" content="./browserconfig.xml" />
    <meta name="format-detection" content="telephone=no" />
    <meta property="og:image" content="./icon_maskable_192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Locket</title>
</head>
<body>
    <noscript>
        <p>
            You don't have Javascript enabled. This game needs Javascript to work, sorry!
        </p>
    </noscript>
    <div id="bodyContainer">
        <header id="headerBar">
            <button>Settings</button>
        </header>
        <main id="mainColumn">
            <section id="outputArea" aria-live="polite" />
            <textarea id="inputArea" enterkeyhint="Submit" spellcheck="false" />
        </main>
        <div id="preferences">
            <form>
                <label for="prefsTheme">Theme:</label>
                <select name="theme" id="prefsTheme">
                  <!-- Options are generated programmatically. -->
                  <!-- <option value="">Example</option> -->
                </select>
                <label for="prefsFont-size">Font size:</label>
                <input id="prefs-font-size" type="range" min="0.6" max="6" value="1" />
                <label for="prefs-run-code">Run page code</label>
                <input id="prefs-run-code" type="checkbox" />
                <div id="prefs-donecancel-container">
                    <button id="prefs-done">Done</button>
                    <button id="prefs-cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
